<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header — Public</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tixtogo.css">
</head>
<body style="background:var(--color-paper-soft);">

<!-- HEADER PUBLIC — Desktop -->
<header class="bg-paper-white border-b border-line" style="border-color:rgba(27,22,15,0.16);">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
    <!-- Logo -->
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-8 h-8 bg-ink rounded-lg flex items-center justify-center">
        <span class="text-paper-white font-display text-sm font-bold">T</span>
      </div>
      <span class="font-display text-xl text-ink hidden sm:block">TixTogo</span>
    </a>

    <!-- Navigation desktop -->
    <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-ink-soft">
      <a href="index.html" class="hover:text-ink transition">Événements</a>
      <a href="recherche.html" class="hover:text-ink transition">Recherche</a>
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <a href="mes-billets.html" class="btn btn-outline btn-sm hidden sm:inline-flex">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
        Mes billets
      </a>
      <a href="mes-billets.html" class="btn-icon btn-outline md:hidden" aria-label="Mes billets">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
      </a>
    </div>
  </div>
</header>

<!-- HEADER PUBLIC — Mobile (bottom nav) -->
<nav class="bottom-nav md:hidden">
  <a href="index.html" class="bottom-nav-item active">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </a>
  <a href="recherche.html" class="bottom-nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Recherche
  </a>
  <a href="mes-billets.html" class="bottom-nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
    Billets
  </a>
</nav>

</body>
</html>
