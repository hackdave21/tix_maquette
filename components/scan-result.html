<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Composant — Résultat scan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tixtogo.css">
  <style>
    body { background: var(--color-paper); padding: 40px; }
    .example-label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink-soft); margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="example-label">Scan valide — écran vert</div>
<div class="scan-overlay-valid" style="position:relative;height:500px;border-radius:18px;overflow:hidden;margin-bottom:40px;">
  <svg width="80" height="80" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24" style="margin-bottom:20px;">
    <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
    <polyline points="22 4 12 14.01 9 11.01"/>
  </svg>
  <h2 class="font-display text-3xl text-white mb-2">Billet valide</h2>
  <p class="text-white opacity-80 text-sm">Standard — Concert Salle Nyékonakpoè</p>
  <p class="ticket-code text-white opacity-60 mt-4" style="color:white;">#TX-8834-FL</p>
</div>

<div class="example-label">Billet déjà utilisé — écran rouge</div>
<div class="scan-overlay-invalid" style="position:relative;height:500px;border-radius:18px;overflow:hidden;margin-bottom:40px;">
  <svg width="80" height="80" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24" style="margin-bottom:20px;">
    <circle cx="12" cy="12" r="10"/>
    <line x1="15" y1="9" x2="9" y2="15"/>
    <line x1="9" y1="9" x2="15" y2="15"/>
  </svg>
  <h2 class="font-display text-3xl text-white mb-2">Déjà scanné</h2>
  <p class="text-white opacity-80 text-sm">Ce billet a déjà été utilisé</p>
  <p class="ticket-code text-white opacity-60 mt-4" style="color:white;">Scanné à 20:14</p>
</div>

<div class="example-label">Billet invalide — écran rouge</div>
<div class="scan-overlay-invalid" style="position:relative;height:500px;border-radius:18px;overflow:hidden;">
  <svg width="80" height="80" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24" style="margin-bottom:20px;">
    <circle cx="12" cy="12" r="10"/>
    <line x1="15" y1="9" x2="9" y2="15"/>
    <line x1="9" y1="9" x2="15" y2="15"/>
  </svg>
  <h2 class="font-display text-3xl text-white mb-2">Billet invalide</h2>
  <p class="text-white opacity-80 text-sm">Ce billet n'existe pas ou est incorrect</p>
  <p class="ticket-code text-white opacity-60 mt-4" style="color:white;">#XX-0000-XX</p>
</div>

</body>
</html>
