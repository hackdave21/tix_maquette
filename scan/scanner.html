<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scanner | TixTogo</title>
  <meta name="theme-color" content="#1B160F">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tixtogo.css">
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    .scan-line {
      position: absolute;
      left: 10%; right: 10%;
      height: 2px;
      background: var(--color-amber);
      box-shadow: 0 0 12px var(--color-amber);
      animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%, 100% { top: 15%; }
      50% { top: 85%; }
    }
    .corner {
      position: absolute;
      width: 32px; height: 32px;
      border-color: var(--color-amber);
      border-style: solid;
      border-width: 0;
    }
    .corner-tl { top: 12%; left: 8%; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
    .corner-tr { top: 12%; right: 8%; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 12%; left: 8%; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 12%; right: 8%; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }
    .overlay { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 h-14" style="background:rgba(27,22,15,0.9);backdrop-filter:blur(8px);">
  <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full" style="background:rgba(255,255,255,0.1);">
    <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </a>
  <div class="text-center">
    <p class="text-white font-semibold text-sm">Concert — Nyékonakpoè</p>
  </div>
  <div class="flex items-center gap-2 px-3 py-1.5 rounded-full" style="background:var(--color-teal-pale);">
    <span class="w-2 h-2 rounded-full bg-teal animate-pulse"></span>
    <span class="font-mono text-[10px] uppercase tracking-wider text-teal font-medium">En ligne</span>
  </div>
</div>

<!-- CAMERA VIEWFINDER -->
<div class="fixed inset-0 flex flex-col" style="background:#0a0a0a;">
  <!-- Camera area -->
  <div class="flex-1 relative flex items-center justify-center" style="background:linear-gradient(180deg,#111 0%,#1a1a1a 50%,#111 100%);">
    <!-- Corner guides -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <!-- Scan line -->
    <div class="scan-line"></div>
    <!-- Placeholder -->
    <div class="text-center" style="opacity:0.3;">
      <svg class="w-20 h-20 mx-auto text-white" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>
      <p class="text-white font-mono text-xs mt-3">CAMÉRA</p>
    </div>
  </div>

  <!-- Bottom panel -->
  <div class="px-5 pt-5 pb-8" style="background:var(--color-paper-white);border-radius:24px 24px 0 0;">
    <!-- Counter -->
    <div class="text-center mb-5">
      <p class="font-mono text-xs uppercase tracking-wider text-ink-soft">Entrées validées</p>
      <p class="font-display text-5xl text-ink mt-1">347</p>
    </div>

    <!-- Last scan -->
    <div class="flex items-center justify-between p-3 rounded-xl mb-4" style="background:var(--color-paper-soft);">
      <div class="flex items-center gap-2">
        <span class="w-3 h-3 rounded-full bg-teal"></span>
        <div>
          <p class="text-sm font-semibold text-ink">Dernier scan</p>
          <p class="ticket-code text-xs">#TX-8833-KL — Valide</p>
        </div>
      </div>
      <span class="text-xs text-ink-soft font-mono">20:31</span>
    </div>

    <!-- Action buttons -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <button class="btn btn-outline justify-center py-4 text-base">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Manuel
      </button>
      <button class="btn btn-outline justify-center py-4 text-base">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Historique
      </button>
    </div>

    <!-- Sync indicator -->
    <div class="text-center">
      <p class="font-mono text-[10px] uppercase tracking-wider text-ink-soft">
        <span class="inline-block w-2 h-2 rounded-full bg-teal mr-1" style="vertical-align:middle;"></span>
        Synchronisé — 0 en attente
      </p>
    </div>
  </div>
</div>

<!-- MOCK: Valid scan overlay (hidden) -->
<div class="overlay" style="background:var(--color-teal);display:none;" id="overlay-valid">
  <svg class="w-24 h-24 text-white mb-6" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  <h2 class="font-display text-3xl text-white mb-2">Billet valide</h2>
  <p class="text-white opacity-80 text-sm">Standard — Concert Nyékonakpoè</p>
  <p class="text-white opacity-50 font-mono text-xs mt-4">#TX-8834-FL</p>
</div>

<!-- MOCK: Already used overlay (hidden) -->
<div class="overlay" style="background:var(--color-red-custom);display:none;" id="overlay-used">
  <svg class="w-24 h-24 text-white mb-6" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
  <h2 class="font-display text-3xl text-white mb-2">Déjà scanné</h2>
  <p class="text-white opacity-80 text-sm">Ce billet a déjà été utilisé</p>
  <p class="text-white opacity-50 font-mono text-xs mt-4">Scanné à 20:14</p>
</div>

</body>
</html>
