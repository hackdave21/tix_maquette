<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TixTogo — Point de vente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tixtogo.css">
<style>
  :root {
    --ink: #1B160F;
    --ink-soft: #5C5344;
    --paper: #F2E8D4;
    --paper-soft: #F9F3E6;
    --paper-white: #FFFCF6;
    --amber: #E8A33D;
    --amber-deep: #C97F1E;
    --amber-pale: #FBE6BE;
    --teal: #1C7A6B;
    --teal-pale: #DCEFE9;
    --red: #C2402F;
    --red-pale: #F7DEDA;
    --line: rgba(27,22,15,0.16);
    --line-strong: rgba(27,22,15,0.30);
    --radius-card: 18px;
    --radius-ctrl: 10px;
    --shadow-card: 0 1px 0 rgba(27,22,15,0.06);
    --font-display: 'Archivo Black', 'Archivo', sans-serif;
    --font-body: 'Archivo', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }
  h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 400; }

  .pos-header {
    background: var(--paper-white);
    border-bottom: 1.5px solid var(--line);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .pos-header .logo {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--amber-deep);
    letter-spacing: -0.5px;
  }
  .pos-header .divider {
    width: 1.5px;
    height: 28px;
    background: var(--line);
  }
  .pos-header .meta { flex: 1; }
  .pos-header .page-title {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }
  .pos-header .agent-name {
    font-size: 15px;
    font-weight: 700;
    margin-top: 2px;
  }

  .pos-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 100px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .event-banner {
    background: var(--ink);
    color: var(--paper-soft);
    border-radius: var(--radius-card);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .event-banner .event-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--amber);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .event-banner .event-info {
    flex: 1;
    min-width: 0;
  }
  .event-banner .event-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(249,243,230,0.6);
  }
  .event-banner .event-name {
    font-family: var(--font-display);
    font-size: 16px;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--amber-deep);
    margin-bottom: 4px;
  }

  .category-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .category-card {
    background: var(--paper-white);
    border: 2px solid var(--line);
    border-radius: var(--radius-card);
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .category-card:active { transform: scale(0.98); }
  .category-card.selected {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px var(--amber-pale);
  }
  .category-card .cat-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .category-card .cat-name {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--ink);
  }
  .category-card .cat-stock {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
  }
  .category-card .cat-price {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--amber-deep);
    white-space: nowrap;
  }

  .qty-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  .qty-btn {
    width: 60px;
    height: 60px;
    border-radius: var(--radius-ctrl);
    border: 2px solid var(--line-strong);
    background: var(--paper-white);
    color: var(--ink);
    font-family: var(--font-display);
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .qty-btn:active { background: var(--paper-soft); }
  .qty-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .qty-value {
    width: 80px;
    text-align: center;
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--ink);
  }

  .payment-toggle {
    display: flex;
    gap: 12px;
  }
  .pay-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 12px;
    border-radius: var(--radius-card);
    border: 2px solid var(--line-strong);
    background: var(--paper-white);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .pay-btn:active { transform: scale(0.97); }
  .pay-btn.selected {
    border-color: var(--amber);
    background: var(--amber-pale);
    color: var(--ink);
  }
  .pay-btn .pay-icon {
    font-size: 22px;
    line-height: 1;
  }

  .total-bar {
    text-align: center;
    padding: 8px 0;
  }
  .total-bar .total-label {
    font-family: var(--font-mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }
  .total-bar .total-amount {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--ink);
    margin-top: 2px;
  }

  .btn-emit {
    width: 100%;
    padding: 20px;
    border-radius: var(--radius-card);
    border: none;
    background: var(--amber);
    color: var(--ink);
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 0.3px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .btn-emit:active { background: var(--amber-deep); }

  .pos-bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--paper-white);
    border-top: 1.5px solid var(--line);
    display: flex;
    z-index: 50;
  }
  .nav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 0 10px;
    text-decoration: none;
    color: var(--ink-soft);
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s;
  }
  .nav-tab.active {
    color: var(--amber-deep);
  }
  .nav-tab .nav-icon {
    font-size: 22px;
    line-height: 1;
  }
</style>
</head>
<body>

<header class="pos-header">
  <div class="logo">TixTogo</div>
  <div class="divider"></div>
  <div class="meta">
    <div class="page-title">Point de vente</div>
    <div class="agent-name">Sena Dogbe</div>
  </div>
</header>

<main class="pos-scroll">

  <!-- Event selector -->
  <div class="event-banner">
    <div class="event-icon">🎵</div>
    <div class="event-info">
      <div class="event-label">Événement actif</div>
      <div class="event-name">Concert — Salle Nyékonakpoè</div>
    </div>
  </div>

  <!-- Ticket category selection -->
  <section>
    <div class="section-label">Catégorie</div>
    <div class="category-grid">
      <div class="category-card selected" onclick="selectCategory(this, 3000)">
        <div class="cat-left">
          <div class="cat-name">Standard</div>
          <div class="cat-stock">153 restants</div>
        </div>
        <div class="cat-price">3 000 F</div>
      </div>
      <div class="category-card" onclick="selectCategory(this, 10000)">
        <div class="cat-left">
          <div class="cat-name">VIP</div>
          <div class="cat-stock">28 restants</div>
        </div>
        <div class="cat-price">10 000 F</div>
      </div>
      <div class="category-card" onclick="selectCategory(this, 2500)">
        <div class="cat-left">
          <div class="cat-name">Groupe</div>
          <div class="cat-stock">50 restants</div>
        </div>
        <div class="cat-price">2 500 F</div>
      </div>
    </div>
  </section>

  <!-- Quantity selector -->
  <section>
    <div class="section-label">Quantité</div>
    <div class="qty-row">
      <button class="qty-btn" id="qty-minus" onclick="changeQty(-1)" disabled>−</button>
      <div class="qty-value" id="qty-display">1</div>
      <button class="qty-btn" id="qty-plus" onclick="changeQty(1)">+</button>
    </div>
  </section>

  <!-- Payment mode -->
  <section>
    <div class="section-label">Mode de paiement</div>
    <div class="payment-toggle">
      <button class="pay-btn selected" id="pay-cash" onclick="selectPayment('cash')">
        <span class="pay-icon">💵</span>
        Espèces
      </button>
      <button class="pay-btn" id="pay-momo" onclick="selectPayment('momo')">
        <span class="pay-icon">📱</span>
        Mobile Money
      </button>
    </div>
  </section>

  <!-- Total -->
  <div class="total-bar">
    <div class="total-label">Total</div>
    <div class="total-amount" id="total-display">3 000 F</div>
  </div>

  <!-- Emit button -->
  <button class="btn-emit" onclick="emitTicket()">Émettre le billet</button>

</main>

<!-- Bottom navigation -->
<nav class="pos-bottom-nav">
  <a class="nav-tab active" href="index.html">
    <span class="nav-icon">🛒</span>
    Vendre
  </a>
  <a class="nav-tab" href="ventes.html">
    <span class="nav-icon">📋</span>
    Historique
  </a>
  <a class="nav-tab" href="#">
    <span class="nav-icon">👤</span>
    Profil
  </a>
</nav>

<script>
  let unitPrice = 3000;
  let qty = 1;
  const maxQty = 10;

  function formatPrice(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' F';
  }

  function selectCategory(el, price) {
    document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    unitPrice = price;
    updateTotal();
  }

  function changeQty(delta) {
    qty = Math.max(1, Math.min(maxQty, qty + delta));
    document.getElementById('qty-display').textContent = qty;
    document.getElementById('qty-minus').disabled = qty <= 1;
    document.getElementById('qty-plus').disabled = qty >= maxQty;
    updateTotal();
  }

  function selectPayment(mode) {
    document.getElementById('pay-cash').classList.toggle('selected', mode === 'cash');
    document.getElementById('pay-momo').classList.toggle('selected', mode === 'momo');
  }

  function updateTotal() {
    document.getElementById('total-display').textContent = formatPrice(unitPrice * qty);
  }

  function emitTicket() {
    alert('Billet émis ! ' + qty + ' billet(s) — ' + formatPrice(unitPrice * qty));
  }
</script>

</body>
</html>
